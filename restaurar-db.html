<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bóveda de Rescate - CInformado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .input-styled { border: 1px solid #334155; background-color: #1e293b; color: white; border-radius: 8px; padding: 12px 15px; width: 100%; transition: all 0.3s; }
        .input-styled:focus { outline: none; border-color: #ef4444; box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-xl w-full bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 overflow-hidden">
        
        <div class="bg-red-600 p-6 text-center">
            <svg class="w-16 h-16 mx-auto text-white mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            <h1 class="text-2xl font-bold text-white tracking-wide uppercase">Protocolo de Restauración</h1>
            <p class="text-red-100 text-sm mt-2">Solo utiliza esta herramienta en caso de pérdida catastrófica de datos.</p>
        </div>

        <div class="p-8 space-y-6">
            <div class="bg-slate-700/50 p-4 rounded-lg border border-slate-600 text-sm text-slate-300">
                <p><strong>Advertencia:</strong> Al ejecutar la restauración, los datos actuales de la base de datos serán sobreescritos por la información contenida en el archivo Backup (.json).</p>
            </div>

            <form id="restoreForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">1. Selecciona el archivo Backup (.json)</label>
                    <input type="file" id="backupFile" accept=".json" class="input-styled text-sm" required>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">2. PIN Maestro de Seguridad</label>
                    <input type="password" id="pinInput" class="input-styled font-mono tracking-widest text-center text-xl" placeholder="••••••••" required>
                </div>

                <div id="statusMessage" class="hidden p-4 rounded-lg text-sm font-bold text-center"></div>

                <button type="submit" id="btnRestore" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-lg transition-colors flex items-center justify-center shadow-lg shadow-red-900/50">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    Iniciar Restauración de la Base de Datos
                </button>
            </form>
            
            <div class="text-center mt-6">
                <a href="portal-consentimientos.html" class="text-sm text-slate-400 hover:text-white transition-colors">Volver a un lugar seguro</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('restoreForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('backupFile');
            const pinInput = document.getElementById('pinInput').value;
            const btnRestore = document.getElementById('btnRestore');
            const statusMessage = document.getElementById('statusMessage');

            if (!fileInput.files.length) return;

            if (!confirm("⚠️ ADVERTENCIA FINAL ⚠️\n\n¿Estás absolutamente seguro de querer sobreescribir la base de datos con este archivo? Todo el progreso no guardado se perderá.")) {
                return;
            }

            btnRestore.disabled = true;
            btnRestore.innerHTML = '<span class="animate-pulse">Leyendo y restaurando datos...</span>';
            statusMessage.classList.add('hidden');
            
            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = async function(event) {
                try {
                    const jsonData = JSON.parse(event.target.result);
                    
                    // Apuntamos al archivo unificado vault.js que creamos
                    const response = await fetch('/api/vault', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            backupData: jsonData,
                            pinSeguridad: pinInput
                        })
                    });

                    const result = await response.json();

                    statusMessage.classList.remove('hidden', 'bg-red-900/50', 'text-red-400');
                    
                    if (response.ok) {
                        statusMessage.classList.add('bg-emerald-900/50', 'text-emerald-400', 'border', 'border-emerald-700');
                        statusMessage.innerHTML = `✅ ¡ÉXITO! <br> ${result.message} <br> Total de registros: ${result.total}`;
                        
                        // Redirigir al dashboard después de 4 segundos
                        setTimeout(() => window.location.href = 'portal-consentimientos.html', 4000);
                    } else {
                        throw new Error(result.message);
                    }

                } catch (error) {
                    statusMessage.classList.remove('hidden', 'bg-emerald-900/50', 'text-emerald-400');
                    statusMessage.classList.add('bg-red-900/50', 'text-red-400', 'border', 'border-red-700');
                    statusMessage.textContent = `❌ Error: ${error.message}`;
                    btnRestore.disabled = false;
                    btnRestore.innerHTML = `
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        Reintentar Restauración
                    `;
                }
            };

            reader.readAsText(file);
        });
    </script>
</body>
</html>
