<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda y Calendario - CInformado | Marcela Villegas Gallego</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Librería FullCalendar -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #F8F7F2; color: #4A4A4A; }
        .fc-theme-standard th { background-color: #f8fafc; padding: 10px 0; color: #003366; font-weight: 600; text-transform: uppercase; font-size: 0.85rem; }
        .fc-daygrid-day-number { color: #475569; font-weight: 500; text-decoration: none !important; padding: 4px 8px !important;}
        .fc-event { cursor: pointer; border-radius: 6px; padding: 3px 6px; border: none; font-size: 0.8rem; font-weight: 500; transition: transform 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .fc-event:hover { transform: scale(1.02); z-index: 10; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.15); }
        .fc-toolbar-title { color: #003366; font-weight: 700 !important; font-size: 1.5rem !important; text-transform: capitalize; }
        .fc-button-primary { background-color: white !important; color: #003366 !important; border: 1px solid #cbd5e1 !important; text-transform: capitalize !important; font-weight: 600 !important; transition: all 0.2s !important; border-radius: 8px !important; margin: 0 2px !important; }
        .fc-button-primary:hover, .fc-button-active { background-color: #f1f5f9 !important; border-color: #003366 !important; color: #003366 !important; }
        .fc-timegrid-slot { height: 45px !important; }
        .fc-view-harness { background-color: white; border-radius: 12px; overflow: hidden; }
        .fc-scrollgrid { border-radius: 12px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="portal-consentimientos.html" class="flex-shrink-0">
                <img src="logoprincipal.png" alt="Marcela Villegas Gallego Logo" class="h-10 w-auto">
            </a>
            <div class="flex items-center space-x-6">
                <a href="portal-consentimientos.html" class="flex items-center text-sm font-bold text-[#003366] hover:underline transition-colors">
                    <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    Volver al Dashboard
                </a>
                <span class="border-l h-6 border-gray-300"></span>
                <button id="logoutButton" class="text-sm font-bold text-red-600 hover:text-red-800 transition-colors">Cerrar Sesión</button>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8">
        <div class="max-w-7xl mx-auto">
            
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-6 gap-4">
                <div>
                    <h1 class="text-3xl font-bold text-[#003366] flex items-center">
                        <svg class="w-8 h-8 mr-3 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        Agenda Clínica
                    </h1>
                    <p class="text-sm text-gray-500 mt-1">Sincronización de próximas citas y registro histórico de sesiones.</p>
                </div>
                
                <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4">
                    <!-- Leyenda de colores -->
                    <div class="flex space-x-3 bg-white p-3 rounded-xl shadow-sm border border-gray-200 text-xs font-semibold">
                        <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-indigo-500 mr-1.5 shadow-sm"></span> Futura</div>
                        <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-emerald-500 mr-1.5 shadow-sm"></span> Pagada</div>
                        <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-amber-500 mr-1.5 shadow-sm"></span> Pendiente</div>
                    </div>

                    <!-- NUEVO: Interruptor (Toggle) para ocultar el histórico -->
                    <div class="bg-white p-2.5 rounded-xl shadow-sm border border-gray-200 flex items-center">
                        <label class="inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="toggleHistorico" class="sr-only peer" checked>
                            <div class="relative w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-indigo-300 rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                            <span class="ms-3 text-sm font-bold text-[#003366]">Ver Histórico</span>
                        </label>
                    </div>
                </div>
            </div>

            <div id="loading" class="text-center py-12">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-[#003366] mb-4"></div>
                <p class="text-lg text-[#003366] font-semibold">Cargando eventos del calendario...</p>
            </div>

            <div id="calendarContainer" class="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-gray-200 hidden">
                <div id="calendar"></div>
            </div>

        </div>
    </main>

    <!-- Modal Detalles de Evento -->
    <div id="eventModal" class="fixed inset-0 bg-[#003366] bg-opacity-75 hidden z-50 flex justify-center items-center px-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col relative transform transition-all scale-100">
            <div class="bg-gray-50 border-b border-gray-200 px-6 py-4 flex justify-between items-center">
                <h2 class="text-lg font-bold text-[#003366] flex items-center" id="modalTitle">
                    Detalle de Evento
                </h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 hover:bg-red-50 p-1.5 rounded-full transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="px-6 py-6 space-y-4 text-sm max-h-[60vh] overflow-y-auto" id="modalBody">
                <!-- Inyectado por JS -->
            </div>
            
            <div class="px-6 py-4 bg-gray-50 border-t border-gray-200" id="modalFooter">
                <!-- Inyectado por JS -->
            </div>
        </div>
    </div>

    <script>
        let globalCalendar;
        let allEventsData = []; // Guardará todos los eventos para filtrarlos rápido

        document.addEventListener('DOMContentLoaded', async () => {
            if (sessionStorage.getItem('consultorAuth') !== 'true') {
                window.location.href = 'login.html'; return;
            }
            document.getElementById('logoutButton').addEventListener('click', () => {
                sessionStorage.removeItem('consultorAuth'); window.location.href = 'login.html';
            });

            await initCalendar();
            setupToggle();
        });

        async function initCalendar() {
            try {
                const response = await fetch('/api/citas');
                if (!response.ok) throw new Error('Falló la carga de citas.');
                
                // Guardamos los datos en la variable global
                allEventsData = await response.json();

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('calendarContainer').classList.remove('hidden');

                const calendarEl = document.getElementById('calendar');
                globalCalendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: window.innerWidth < 768 ? 'timeGridDay' : 'timeGridWeek',
                    locale: 'es',
                    headerToolbar: {
                        left: 'prev,next today',
                        center: 'title',
                        right: 'dayGridMonth,timeGridWeek,timeGridDay,listWeek'
                    },
                    buttonText: {
                        today: 'Hoy', month: 'Mes', week: 'Semana', day: 'Día', list: 'Agenda'
                    },
                    events: allEventsData,
                    slotMinTime: '06:00:00',
                    slotMaxTime: '22:00:00',
                    allDayText: 'Histórico',
                    nowIndicator: true,
                    dayMaxEvents: true, // NUEVO: Evita que el calendario de mes se deforme si hay muchos eventos
                    eventClick: function(info) {
                        openEventModal(info.event);
                    }
                });

                globalCalendar.render();
            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerHTML = '<span class="text-red-500 font-bold">Error de conexión al cargar la agenda.</span>';
            }
        }

        // LÓGICA DEL INTERRUPTOR MÁGICO
        function setupToggle() {
            document.getElementById('toggleHistorico').addEventListener('change', (e) => {
                const showHistory = e.target.checked;
                
                // Filtramos la lista de eventos en memoria
                const filteredEvents = showHistory 
                    ? allEventsData 
                    : allEventsData.filter(ev => ev.extendedProps.tipo !== 'Pasada');

                // Borramos los eventos actuales y le inyectamos los filtrados
                globalCalendar.removeAllEventSources();
                globalCalendar.addEventSource(filteredEvents);
            });
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(value);
        }

        function openEventModal(event) {
            const props = event.extendedProps;
            const title = event.title.replace('🗓️ ', '').replace('✅ ', '');
            
            document.getElementById('modalTitle').textContent = props.tipo === 'Futura' ? 'Cita Programada' : 'Sesión Histórica';
            let bodyHtml = `<div class="mb-3"><span class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Paciente</span><span class="text-lg font-bold text-[#003366]">${title}</span></div>`;

            if (props.tipo === 'Futura') {
                const fecha = event.start.toLocaleDateString('es-CO', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                const hora = event.start.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit', hour12: false });
                const fechaCompleta = `${fecha} a las ${hora}`;
                
                bodyHtml += `
                    <div class="mb-3"><span class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Fecha y Hora Actual</span><span class="text-gray-800 capitalize font-medium">${fechaCompleta}</span></div>
                    <div class="mb-3"><span class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Duración Reservada</span><span class="text-gray-800 font-medium">1 hora</span></div>
                `;
                
                if (props.direccion) {
                    bodyHtml += `
                    <div class="mt-4 p-3 bg-emerald-50 border border-emerald-100 rounded-xl">
                        <span class="block text-xs font-bold text-emerald-700 uppercase tracking-wider mb-2 flex items-center">
                            <svg class="w-4 h-4 mr-1 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            Cita Presencial
                        </span>
                        <span class="text-emerald-900 font-semibold text-sm">${props.direccion}</span>
                    </div>`;
                }

                if (props.meet) {
                    bodyHtml += `
                    <div class="mt-4 p-3 bg-indigo-50 border border-indigo-100 rounded-xl">
                        <span class="block text-xs font-bold text-indigo-700 uppercase tracking-wider mb-2 flex items-center">
                            <svg class="w-4 h-4 mr-1 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                            Sala de Videollamada ${props.direccion ? '(Alternativa)' : ''}
                        </span>
                        <a href="${props.meet}" target="_blank" class="inline-flex items-center text-indigo-700 hover:text-indigo-900 hover:underline break-all font-semibold text-sm">
                            ${props.meet}
                        </a>
                    </div>`;
                }

                bodyHtml += `
                    <div id="reprogramarForm" class="hidden mt-4 p-4 bg-white border border-gray-200 shadow-sm rounded-xl">
                        <h4 class="text-sm font-bold text-gray-800 mb-3 flex items-center">
                            <svg class="w-4 h-4 mr-1 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            Elegir nueva fecha
                        </h4>
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1">Nueva Fecha</label>
                                <input type="date" id="reprogramarFecha" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1">Nueva Hora</label>
                                <input type="time" id="reprogramarHora" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
                            </div>
                        </div>
                        <div class="mt-3 flex items-center bg-gray-50 border border-gray-200 rounded-lg px-3 py-2">
                            <input type="checkbox" id="reprogramarPresencial" class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500 cursor-pointer" ${props.direccion ? 'checked' : ''} onchange="document.getElementById('reprogramarDirBox').classList.toggle('hidden')">
                            <label for="reprogramarPresencial" class="ml-2 text-xs font-bold text-gray-700 cursor-pointer">Cita Presencial</label>
                        </div>
                        <div id="reprogramarDirBox" class="${props.direccion ? '' : 'hidden'} mt-2 mb-3">
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Dirección del Consultorio</label>
                            <input type="text" id="reprogramarDireccion" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500" value="${props.direccion || 'Consultorio Marcela Villegas Gallego'}">
                        </div>
                        <button onclick="reprogramarCita('${props.pacienteId}', '${props.email}', '${title}', '${props.meet}', this)" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg text-sm transition-colors shadow-sm">
                            Guardar y Notificar Cambios
                        </button>
                    </div>
                `;

                document.getElementById('modalFooter').innerHTML = `
                    <div class="grid grid-cols-2 gap-2 w-full">
                        <button onclick="closeModal()" class="bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 font-bold py-2 px-2 rounded-lg transition-colors text-sm">Cerrar</button>
                        <a href="historia-clinica.html?id=${props.pacienteId}" class="inline-flex items-center justify-center bg-[#003366] hover:bg-[#002244] text-white font-bold py-2 px-2 rounded-lg transition-colors text-sm shadow-md">Abrir Historia</a>
                        <button onclick="document.getElementById('reprogramarForm').classList.toggle('hidden')" class="bg-indigo-50 text-indigo-700 border border-indigo-200 hover:bg-indigo-100 font-bold py-2 px-2 rounded-lg transition-colors text-sm">Reprogramar Cita</button>
                        <button onclick="cancelarCita('${props.pacienteId}', '${props.email}', '${title}', '${fechaCompleta}', this)" class="bg-red-50 text-red-600 border border-red-200 hover:bg-red-100 font-bold py-2 px-2 rounded-lg transition-colors text-sm">Cancelar Cita</button>
                    </div>
                `;

            } else {
                const fecha = event.start.toLocaleDateString('es-CO', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                const estadoPago = props.pagado 
                    ? '<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold bg-emerald-100 text-emerald-800">✓ Pagado</span>' 
                    : '<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold bg-amber-100 text-amber-800">⏳ Pendiente</span>';
                
                bodyHtml += `
                    <div class="mb-3"><span class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Fecha de Sesión Clínica</span><span class="text-gray-800 capitalize font-medium">${fecha}</span></div>
                    <div class="flex justify-between items-center mt-5 p-4 bg-gray-50 border border-gray-200 rounded-xl">
                        <div>
                            <span class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Valor de la Sesión</span>
                            <span class="text-gray-900 font-bold text-lg">${formatCurrency(props.valor)}</span>
                        </div>
                        <div class="text-right">
                            <span class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Estado Financiero</span>
                            ${estadoPago}
                        </div>
                    </div>
                    <p class="text-xs text-gray-400 mt-4 italic text-center">Para modificar los datos clínicos de esta sesión, debes ingresar al expediente.</p>
                `;

                document.getElementById('modalFooter').innerHTML = `
                    <div class="flex space-x-2 w-full">
                        <button onclick="closeModal()" class="flex-1 bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 font-bold py-2.5 px-4 rounded-lg transition-colors text-sm">Cerrar</button>
                        <a href="historia-clinica.html?id=${props.pacienteId}" class="flex-1 inline-flex items-center justify-center bg-[#003366] hover:bg-[#002244] text-white font-bold py-2.5 px-4 rounded-lg transition-colors text-sm shadow-md">Abrir Historia</a>
                    </div>
                `;
            }

            document.getElementById('modalBody').innerHTML = bodyHtml;
            document.getElementById('eventModal').classList.remove('hidden');
        }

        async function cancelarCita(pacienteId, email, nombre, fechaStr, btnElement) {
            if (!confirm(`¿Estás segura de cancelar la cita de ${nombre} para el ${fechaStr}?\n\nAl confirmar, se enviará un correo automático de cancelación al paciente y se borrará del calendario.`)) {
                return;
            }

            const originalText = btnElement.textContent;
            btnElement.disabled = true;
            btnElement.textContent = 'Cancelando...';

            try {
                const response = await fetch('/api/citas', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        pacienteId: pacienteId,
                        enviarCorreo: true,
                        emailPaciente: email,
                        nombrePaciente: nombre,
                        fechaStr: fechaStr
                    })
                });

                if (response.ok) {
                    alert('Cita cancelada correctamente.');
                    window.location.reload(); 
                } else {
                    throw new Error('Error al cancelar');
                }
            } catch (error) {
                alert('Hubo un error de conexión al intentar cancelar.');
                btnElement.disabled = false;
                btnElement.textContent = originalText;
            }
        }

        async function reprogramarCita(pacienteId, email, nombre, meet, btnElement) {
            const nuevaFecha = document.getElementById('reprogramarFecha').value;
            const nuevaHora = document.getElementById('reprogramarHora').value;
            const isPresencial = document.getElementById('reprogramarPresencial').checked;
            const direccion = document.getElementById('reprogramarDireccion').value;

            if (!nuevaFecha || !nuevaHora) {
                alert("Por favor, elige la nueva fecha y hora.");
                return;
            }

            const originalText = btnElement.textContent;
            btnElement.disabled = true;
            btnElement.textContent = 'Reprogramando...';

            try {
                const response = await fetch('/api/citas', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        pacienteId: pacienteId,
                        emailPaciente: email,
                        nombrePaciente: nombre,
                        fecha: nuevaFecha,
                        hora: nuevaHora,
                        enlaceMeet: meet,
                        isPresencial: isPresencial,
                        direccionConsultorio: direccion
                    })
                });

                if (response.ok) {
                    alert('Cita reprogramada con éxito. Se enviaron los correos de notificación.');
                    window.location.reload();
                } else {
                    throw new Error('Error al reprogramar');
                }
            } catch (error) {
                alert('Error de conexión al reprogramar.');
                btnElement.disabled = false;
                btnElement.textContent = originalText;
            }
        }

        function closeModal() {
            document.getElementById('eventModal').classList.add('hidden');
        }
    </script>
</body>
</html>
